name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: >-
          ruff check
          agent/communication
          agent/tools/web_search.py
          agent/tools/http_client.py
          agent/runtime_config.py
          agent/config.py

      - name: Mypy
        run: >-
          mypy
          agent/communication/discord_presenter.py
          agent/communication/discord_commands.py
          agent/communication/discord_session.py
          agent/communication/discord_constants.py
          agent/tools/web_search.py
          agent/tools/http_client.py
          agent/runtime_config.py
          agent/config.py
